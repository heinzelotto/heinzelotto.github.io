<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Page pinch-zoom disabled: the graph canvas owns pinch (d3-zoom), and on
         Firefox Android the native page zoom fights it frame-by-frame (flicker).
         Android's "always enable zoom" a11y setting still overrides this. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <!-- ℙ₁ mark (drawn as paths — no font dependency). The page title keeps the
         ArgMap name until the P1 rename is decided proper (chrome-declutter
         plan, open question 2). -->
    <link rel="icon" type="image/svg+xml" href="/argmap/favicon.svg" />
    <!-- First-class light+dark support (dark-polish, 2026-07-19). Declaring it
         here (pre-CSS) also tells Chrome Android's Auto Dark Theme to keep its
         algorithmic darkening OFF — that forced filter was what blurred the
         zoomed-out LOD labels and swallowed edge halves on phones. -->
    <meta name="color-scheme" content="light dark" />
    <title>ArgMap — v0.2 editor</title>
    <script type="module" crossorigin src="/argmap/assets/index-rE5UYiZd.js"></script>
    <link rel="stylesheet" crossorigin href="/argmap/assets/index-BhnTt6aS.css">
  <link rel="manifest" href="/argmap/manifest.webmanifest"></head>
  <body>
    <div id="root"></div>
  </body>
</html>
